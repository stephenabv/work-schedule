name: SMS Class Reminders

# Fires once per reminder instead of polling: Monday–Saturday, 15 minutes
# before each class starts and 10 minutes before each class ends (GitHub's
# schedule triggers usually run a few minutes late, so the SMS lands roughly
# 10 / 5 minutes ahead — e.g. an 8:00–10:00 class is pinged at 7:45 and 9:50).
# The endpoint uses the forwarded cron expression to work out exactly which
# class(es) the run was scheduled for, so no SMS is spent outside these
# moments and late runs neither miss nor duplicate reminders.
on:
  schedule:
    # Times below are UTC (the class schedule is UTC+8). Regenerate this
    # block after editing lib/schedule-data.ts:
    # --- BEGIN GENERATED CRONS (npm run generate:crons — do not edit by hand) ---
    - cron: "45 0 * * 2,4"
    - cron: "50 0 * * 4"
    - cron: "15 1 * * 1"
    - cron: "15 2 * * 1,3,5"
    - cron: "20 2 * * 1,2,4"
    - cron: "45 2 * * 4"
    - cron: "50 2 * * 6"
    - cron: "15 3 * * 1"
    - cron: "20 3 * * 1,3,5"
    - cron: "45 3 * * 2,4,6"
    - cron: "50 3 * * 4"
    - cron: "15 4 * * 1,3"
    - cron: "20 4 * * 1"
    - cron: "15 5 * * 2,4"
    - cron: "20 5 * * 2,4"
    - cron: "45 5 * * 1,3"
    - cron: "50 5 * * 1,3"
    - cron: "50 6 * * 2,4,6"
    - cron: "15 7 * * 4"
    - cron: "50 7 * * 1,3"
    - cron: "15 8 * * 1"
    - cron: "20 8 * * 4"
    - cron: "20 9 * * 1"
    - cron: "45 23 * * 3,5"
    # --- END GENERATED CRONS ---
  workflow_dispatch: {}

jobs:
  ping-reminder-endpoint:
    runs-on: ubuntu-latest
    steps:
      - name: Check CRON_SECRET is configured
        run: |
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "::error::The CRON_SECRET repository secret is not set, so this workflow" \
              "cannot authorize against /api/notifications/cron. Add it under Settings ->" \
              "Secrets and variables -> Actions, using the same value configured in the" \
              "CRON_SECRET environment variable on the Vercel project."
            exit 1
          fi
      - name: Call reminder endpoint
        run: |
          curl -sf -X GET "https://work-schedule-ivory.vercel.app/api/notifications/cron" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "X-Github-Schedule: ${{ github.event.schedule }}"
